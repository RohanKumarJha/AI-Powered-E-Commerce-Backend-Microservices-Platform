server:
  port: 8083

spring:
  application:
    name: Inventory-Microservice

  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console: enabled
  datasource:
    url: jdbc:h2:mem:testdb

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}